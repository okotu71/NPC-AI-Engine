# =========================================================
# okotu-npc-ai-engine - configuration
# =========================================================

# Which MySQL profile to use: "prod" or "test" (see the "prod" / "test" blocks below).
# Can be overridden without touching this file via a JVM system property when
# starting the server, which takes precedence over this value:
#   -Dokotu.profile=test
active-profile: "prod"

prod:
  mysql-host: "ip_server"
  mysql-port: 3306
  mysql-database: "okotu_npc_ai"
  mysql-username: "usr"
  mysql-password: "psw"
  # Optional prefix prepended to every table name (e.g. "srv1_" -> "srv1_npc_character").
  # Leave empty ("") to use the plain table names shown in schema.sql.
  mysql-table-prefix: ""

test:
  mysql-host: "ip_server"
  mysql-port: 3306
  mysql-database: "okotu_npc_ai_test"
  mysql-username: "usr"
  mysql-password: "psw"
  mysql-table-prefix: ""

# Shared connection-pool settings (apply to whichever profile is active).
mysql-pool-size: 10
mysql-extra-params: "useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC"

ollama:
  # Address of the Ollama docking service (the Pterodactyl egg set up earlier).
  base-url: "http://127.0.0.1:11434"
  # Default model used if an NPC doesn't have its own override.
  default-model: "qwen2.5:1.5b"
  # Request timeout, after which the fallback response kicks in.
  timeout-ms: 8000
  # Extra attempts on network error/timeout (0 = no retries).
  max-retries: 1
  retry-delay-ms: 500

conversation:
  # How many turns (single messages) to keep per (npc, player) pair.
  history-size: 20
  # In-RAM cache (Caffeine): avoids hitting MySQL on every single message.
  cache-max-entries: 5000
  cache-expire-after-minutes: 30
  # How often (in minutes) the job that trims MySQL beyond history-size runs.
  cleanup-interval-minutes: 10

rate-limit:
  # Minimum time between two AI requests from the same player, in milliseconds.
  per-player-cooldown-ms: 3000

fallback:
  enabled: true
  messages:
    - "*The NPC nods absentmindedly and doesn't seem to follow what you're saying.*"
    - "*The NPC is busy and only grunts in reply.*"
    - "*The NPC stares at you in silence for a moment, then changes the subject.*"

# Optional per-NPC configuration (key = Citizens npc_id).
# Any NPC not listed here falls back to the defaults above and a generic system prompt.
npcs:
  default:
    model: "qwen2.5:1.5b"
    system-prompt: >
      You are {name}, a character living in a Minecraft world.
      Backstory: {backstory}
      Personality: {personality}
      Always stay in character, answer in a way consistent with a game chat:
      short replies (2-3 sentences max).

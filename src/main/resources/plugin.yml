name: OkotuNpcAiEngine
version: '${project.version}'
main: com.okotu.npcai.OkotuNpcAiPlugin
api-version: '1.20'
author: okotu
description: AI dialogue engine for Citizens NPCs, backed by Ollama and MySQL persistence.

depend: [Citizens]

commands:
  okotunpc:
    description: Admin commands for okotu-npc-ai-engine
    usage: /okotunpc <reload|profile|knowledge|event|relationship|state|info>
    permission: okotu.npcai.admin

permissions:
  okotu.npcai.admin:
    description: Allows managing the plugin (reload, per-NPC configuration)
    default: op
  okotu.npcai.talk:
    description: Allows talking to NPCs managed by the plugin
    default: true

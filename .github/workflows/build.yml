
      
      
      
      - name: Read Maven version
        id: version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
      
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: McBank-${{ steps.version.outputs.VERSION }}
          path: target/*.jar
